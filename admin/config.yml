# Decap CMS configuration
# ----------------------------------------------------------------------------
# Owner logs in at /admin with GitHub, edits the work list, and clicks Publish.
# Publishing commits data/videos.json to the repo; Vercel redeploys (~1 min).
#
# ⚠️ EDIT THE 3 PLACEHOLDERS BELOW before this works (see README "Self-service CMS"):
#   - repo:     your GitHub  owner/repo
#   - base_url: your live site URL (the OAuth handshake runs there)
backend:
  name: github
  repo: oceanssaint-bot/fiveofifty
  branch: main
  base_url: https://fiveofifty.vercel.app   # your deployed site URL
  auth_endpoint: api/auth

# Where uploaded images (e.g. custom thumbnails) are stored in the repo.
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Show a clear message and keep editors out of the weeds.
publish_mode: simple
site_url: https://fiveofifty.vercel.app

collections:
  - name: work
    label: "Work"
    description: "The studio's video work. Shows on the Videos page and Latest Work."
    files:
      - name: videos
        label: "Videos"
        file: "data/videos.json"
        editor:
          preview: false
        fields:
          - label: "Videos"
            name: "videos"
            label_singular: "Video"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}} ({{fields.year}})"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["Fashion Film", "Commercial", "Music Video", "Entertainment", "Documentary", "Other"]
              - { label: "Year", name: "year", widget: "string", pattern: ['^\d{4}$', "Use a 4-digit year, e.g. 2026"] }
              - label: "Platform"
                name: "platform"
                widget: "select"
                options: ["youtube", "vimeo"]
                default: "youtube"
              - { label: "Video link (paste the YouTube or Vimeo URL)", name: "url", widget: "string" }
              - { label: "Short description", name: "description", widget: "text", required: false }
              - label: "Custom thumbnail (optional — YouTube fills this in automatically)"
                name: "thumbnail"
                widget: "image"
                required: false
                default: ""
              - { label: "Feature in Latest Work (home page)", name: "featured", widget: "boolean", default: true }
